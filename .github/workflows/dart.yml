name: iOS-ipa-build
on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: pod install
        working-directory: ios

      - name: Build unsigned .app
        run: |
          xcodebuild -workspace ChefgyApp.xcworkspace \
            -scheme ChefgyApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
        working-directory: ios

      - run: mkdir Payload
        working-directory: ios/build/Build/Products/Release-iphoneos

      - run: mv ChefgyApp.app Payload
        working-directory: ios/build/Build/Products/Release-iphoneos

      - name: Zip output
        run: zip -qq -r -9 ChefgyAppIpaExport.ipa Payload
        working-directory: ios/build/Build/Products/Release-iphoneos

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ios/build/Build/Products/Release-iphoneos/ChefgyAppIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"